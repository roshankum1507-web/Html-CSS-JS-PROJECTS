<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Calculator.css">
    <title>MY Calculator</title>

</head>

<body>
    <div class="wrapper">
        <div class="header">
            <h1>Calculator Pro</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
        </div>

        <div class="container">
            <div class="input-section">
                <div class="input-group">
                    <label>First Number</label>
                    <input type="number" id="num1" placeholder="Enter first number" onkeypress="handleKeyPress(event)">
                </div>

                <div class="input-group">
                    <label>Second Number</label>
                    <input type="number" id="num2" placeholder="Enter second number" onkeypress="handleKeyPress(event)">
                </div>
            </div>

            <div class="operations-grid">
                <div class="operation-row">
                    <button class="operation-btn active" data-op="add" onclick="selectOperation('add', this)">Add
                        (+)</button>
                    <button class="operation-btn" data-op="sub" onclick="selectOperation('sub', this)">Subtract
                        (−)</button>
                </div>
                <div class="operation-row">
                    <button class="operation-btn" data-op="mul" onclick="selectOperation('mul', this)">Multiply
                        (×)</button>
                    <button class="operation-btn" data-op="div" onclick="selectOperation('div', this)">Divide
                        (÷)</button>
                </div>
                <div class="operation-row">
                    <button class="operation-btn" data-op="pow" onclick="selectOperation('pow', this)">Power
                        (x²)</button>
                    <button class="operation-btn" data-op="mod" onclick="selectOperation('mod', this)">Modulo
                        (%)</button>
                </div>
                <div class="operation-row">
                    <button class="operation-btn" data-op="sqrt" onclick="selectOperation('sqrt', this)">Square Root
                        (√)</button>
                    <button class="operation-btn" data-op="percent"
                        onclick="selectOperation('percent', this)">Percentage</button>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="calculate()">Calculate</button>
                <button class="btn-secondary" onclick="reset()">Reset</button>
                <button class="btn-danger" onclick="deleteLastEntry()">Delete</button>
            </div>

            <div class="result-group">
                <label>Result</label>
                <div class="result-display" id="result">0</div>
            </div>

            <div class="history-section">
                <div class="history-label">Calculation History</div>
                <div class="history-list" id="historyList"></div>
                <button class="clear-history-btn" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>
    <script src="Calculator.js"></script>

</body>

</html>
