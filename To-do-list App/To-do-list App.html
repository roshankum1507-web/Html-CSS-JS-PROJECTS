<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST APP</title>
    <meta name="description" content="A simple and elegant to-do list app.">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@400;500;700;800&display=swap');

        :root {
            --bg-top: #06070d;
            --bg-bottom: #141724;
            --ink: #e8edf7;
            --ink-soft: #a9b3c8;
            --card: rgba(11, 14, 24, 0.82);
            --card-border: rgba(154, 173, 217, 0.24);
            --input-bg: #0f1321;
            --input-border: #2b3449;
            --input-focus: #6aa6ff;
            --input-ring: rgba(106, 166, 255, 0.28);
            --primary-a: #3b82f6;
            --primary-b: #6366f1;
            --primary-hover-a: #2563eb;
            --primary-hover-b: #4f46e5;
            --task-bg: #111525;
            --task-border: #283247;
            --success: #34d399;
            --danger: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 24px;
            display: grid;
            place-items: center;
            position: relative;
            overflow-x: hidden;
            color: var(--ink);
            font-family: 'Manrope', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.45;
            background:
                radial-gradient(62% 48% at 12% 12%, rgba(59, 130, 246, 0.3), transparent 72%),
                radial-gradient(58% 46% at 88% 88%, rgba(99, 102, 241, 0.26), transparent 72%),
                linear-gradient(165deg, var(--bg-top), var(--bg-bottom));
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(128, 145, 186, 0.11) 0.9px, transparent 0.9px);
            background-size: 24px 24px;
            opacity: 0.22;
            z-index: 0;
        }

        .container {
            width: min(100%, 700px);
            padding: 30px;
            position: relative;
            z-index: 1;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            background: var(--card);
            backdrop-filter: blur(14px);
            box-shadow:
                0 26px 64px rgba(0, 0, 0, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: container-reveal 900ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .container::before {
            content: '';
            position: absolute;
            width: 140px;
            height: 140px;
            right: -35px;
            top: -35px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.34), rgba(79, 70, 229, 0));
            pointer-events: none;
        }

        h1 {
            text-align: center;
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(1.7rem, 3.5vw, 2.35rem);
            letter-spacing: 0.3px;
            margin-bottom: 8px;
            color: #f3f7ff;
            text-shadow: 0 0 18px rgba(99, 102, 241, 0.35);
        }

        .title-text {
            display: inline-block;
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            vertical-align: bottom;
            border-right: 2px solid rgba(243, 247, 255, 0.95);
            animation: typing 1.9s steps(13, end) 280ms forwards, caret-blink 720ms step-end 280ms infinite;
        }

        .title-icons {
            display: inline-block;
            margin-left: 6px;
            transform-origin: center;
            opacity: 0;
            animation: icon-pop 680ms 2.15s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 18px;
            color: var(--ink-soft);
            font-size: 0.95rem;
        }

        .form-row {
            display: flex;
            margin-bottom: 16px;
        }

        .input-wrap {
            width: 100%;
            position: relative;
        }

        #taskInput {
            width: 100%;
            height: 54px;
            border-radius: 14px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            padding: 0 134px 0 16px;
            font: 500 0.98rem 'Manrope', sans-serif;
            color: var(--ink);
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        #taskInput::placeholder {
            color: #7f8aa3;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px var(--input-ring), inset 0 1px 2px rgba(0, 0, 0, 0.22);
            transform: translateY(-1px);
        }

        #addTaskBtn {
            position: absolute;
            top: 50%;
            right: 6px;
            transform: translateY(-50%);
            height: 42px;
            padding: 0 16px;
            border: 0;
            border-radius: 11px;
            cursor: pointer;
            color: #fff;
            font: 800 0.86rem 'Manrope', sans-serif;
            letter-spacing: 0.2px;
            background: linear-gradient(135deg, var(--primary-a), var(--primary-b));
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.42);
            transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
        }

        #addTaskBtn:hover {
            background: linear-gradient(135deg, var(--primary-hover-a), var(--primary-hover-b));
            box-shadow: 0 14px 26px rgba(79, 70, 229, 0.44);
            filter: saturate(1.04);
        }

        #addTaskBtn:active {
            transform: translateY(calc(-50% + 1px)) scale(0.985);
        }

        #addTaskBtn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(12, 18, 33, 0.95), 0 0 0 6px rgba(99, 102, 241, 0.45);
        }

        #taskList {
            list-style: none;
            display: grid;
            gap: 10px;
        }

        #taskList:empty::before {
            content: 'No tasks yet. Add your first one above.';
            display: block;
            text-align: center;
            padding: 18px 8px;
            color: var(--ink-soft);
            border: 1px dashed #394969;
            border-radius: 12px;
            background: rgba(19, 25, 40, 0.56);
        }

        #taskList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--task-border);
            background: var(--task-bg);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
            animation: item-in 280ms ease-out;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        #taskList li:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(17, 24, 39, 0.6);
        }

        .task-text {
            flex: 1;
            font-weight: 600;
            word-break: break-word;
        }

        .task-actions {
            display: inline-flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .task-btn {
            border: 1px solid #33415e;
            background: #131a2b;
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font: 700 0.8rem 'Manrope', sans-serif;
            transition: background-color 140ms ease, transform 140ms ease, border-color 140ms ease;
        }

        .task-btn:hover {
            border-color: #4a5f85;
            background: #18243b;
            transform: translateY(-1px);
        }

        .task-complete {
            color: var(--success);
        }

        .task-delete {
            color: var(--danger);
        }

        .task-done {
            background: #0f1628;
        }

        .task-done .task-text {
            text-decoration: line-through;
            text-decoration-thickness: 1.8px;
            color: #7f8aa3;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes container-reveal {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.975);
                filter: blur(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 13ch;
            }
        }

        @keyframes caret-blink {
            from,
            to {
                border-right-color: transparent;
            }

            50% {
                border-right-color: rgba(243, 247, 255, 0.95);
            }
        }

        @keyframes icon-pop {
            from {
                opacity: 0;
                transform: scale(0.6) rotate(-12deg);
            }

            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes item-in {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
            }

            .container {
                padding: 18px;
                border-radius: 18px;
            }

            #taskInput {
                padding-right: 118px;
                height: 50px;
                font-size: 0.94rem;
            }

            #addTaskBtn {
                height: 38px;
                padding: 0 12px;
                font-size: 0.8rem;
            }

            #taskList li {
                align-items: flex-start;
                flex-direction: column;
            }

            .task-actions {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>


<body>

    <main class="container" aria-label="To-do list app">
        <h1><span class="title-text">TODAY'S TASKS</span> <span class="title-icons" aria-hidden="true">&#128210;</span></h1>
        <p class="subtitle">Plan your day with clarity</p>

        <div class="form-row">
            <div class="input-wrap">
                <label class="sr-only" for="taskInput">Enter a task</label>
                <input type="text" id="taskInput" placeholder="Enter a task" autocomplete="off">
                <button id="addTaskBtn" type="button">Add Task</button>
            </div>
        </div>

        <ul id="taskList" aria-live="polite"></ul>
    </main>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const taskList = document.getElementById('taskList');
        const storageKey = 'todo.tasks.v1';

        let tasks = loadTasks();
        renderTasks();

        addTaskBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                addTask();
            }
        });

        taskList.addEventListener('click', (event) => {
            const actionButton = event.target.closest('button[data-action]');
            if (!actionButton) {
                return;
            }

            const listItem = actionButton.closest('li[data-id]');
            if (!listItem) {
                return;
            }

            const taskId = Number(listItem.dataset.id);
            const action = actionButton.dataset.action;

            if (action === 'toggle') {
                tasks = tasks.map((task) =>
                    task.id === taskId ? { ...task, done: !task.done } : task
                );
            }

            if (action === 'delete') {
                tasks = tasks.filter((task) => task.id !== taskId);
            }

            saveTasks();
            renderTasks();
        });

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) {
                taskInput.focus();
                return;
            }

            tasks.unshift({
                id: Date.now(),
                text,
                done: false,
            });

            taskInput.value = '';
            saveTasks();
            renderTasks();
            taskInput.focus();
        }

        function renderTasks() {
            taskList.innerHTML = '';

            tasks.forEach((task) => {
                const li = document.createElement('li');
                li.dataset.id = String(task.id);
                if (task.done) {
                    li.classList.add('task-done');
                }

                const textSpan = document.createElement('span');
                textSpan.className = 'task-text';
                textSpan.textContent = task.text;

                const actions = document.createElement('div');
                actions.className = 'task-actions';

                const toggleBtn = document.createElement('button');
                toggleBtn.type = 'button';
                toggleBtn.className = 'task-btn task-complete';
                toggleBtn.dataset.action = 'toggle';
                toggleBtn.textContent = task.done ? 'Undo' : 'Done';

                const deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'task-btn task-delete';
                deleteBtn.dataset.action = 'delete';
                deleteBtn.textContent = 'Delete';

                actions.append(toggleBtn, deleteBtn);
                li.append(textSpan, actions);
                taskList.appendChild(li);
            });
        }

        function saveTasks() {
            localStorage.setItem(storageKey, JSON.stringify(tasks));
        }

        function loadTasks() {
            try {
                const raw = localStorage.getItem(storageKey);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }
    </script>

</body>

</html>
