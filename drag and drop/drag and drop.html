<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="drag and drop.css">
    <title>Drag & Drop</title>

</head>

<body>
    <h1 class="header"> Drag & Drop Cards</h1>

    <div class="container">
        <div class="right">
            <div class="column-label"> Available Boxes</div>
            <div class="box" draggable="true">BOX 1</div>
            <div class="box" draggable="true">BOX 2</div>
            <div class="box" draggable="true">BOX 3</div>
            <div class="stats">
                <span>Draggable: <span id="available-count">3</span></span>
            </div>
        </div>
        <div class="left">
            <div class="column-label"> Dropped Boxes</div>
            <div class="stats">
                <span>Dropped: <span id="dropped-count">0</span></span>
            </div>
        </div>
    </div>


    <script src="drag and drop.js"></script>
</body>

</html>
