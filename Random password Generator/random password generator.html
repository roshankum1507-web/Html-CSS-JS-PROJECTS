<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="random password generator.css">
    <title>Random Password Generator</title>
</head>

<body>
    <main class="page-shell">
        <h1 class="title"><span id="randomWord">Random</span> <span id="bolder">Password Generator</span></h1>

        <div class="container">
            <div class="output-row">
                <input type="text" id="passwordField" readonly placeholder="Your password will appear here" aria-label="Generated password">
                <button id="copyButton" type="button">Copy</button>
            </div>

            <div class="control-row">
                <label for="lengthRange">Length: <span id="lengthValue">14</span></label>
                <input type="range" id="lengthRange" min="6" max="32" value="14">
            </div>

            <div class="preset-row" role="group" aria-label="Password presets">
                <button class="preset-btn" data-preset="easy" type="button">Easy</button>
                <button class="preset-btn active" data-preset="strong" type="button">Strong</button>
                <button class="preset-btn" data-preset="ultra" type="button">Ultra</button>
            </div>

            <div class="options-grid">
                <label><input type="checkbox" id="includeUppercase" checked> Uppercase</label>
                <label><input type="checkbox" id="includeLowercase" checked> Lowercase</label>
                <label><input type="checkbox" id="includeNumbers" checked> Numbers</label>
                <label><input type="checkbox" id="includeSymbols" checked> Symbols</label>
            </div>

            <div class="meta-row">
                <span id="strengthText">Strength: Medium</span>
                <span id="copyStatus" aria-live="polite"></span>
            </div>

            <button id="generateButton" type="button">Generate Password</button>
        </div>
    </main>
    <script src="random password generator.js"></script>

</body>

</html>
